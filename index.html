<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle Terms Review - Geometry Study Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page: #faf9f7;
    --bg-card: #ffffff;
    --bg-diagram: rgba(0,0,0,0.02);
    --text-primary: #1a1a1a;
    --text-secondary: #5c5c5c;
    --text-tertiary: #9a9a9a;
    --border: rgba(0,0,0,0.09);
    --border-hover: rgba(0,0,0,0.18);
    --warning: #b47a1a;
    --warning-bg: rgba(232,168,56,0.07);
    --warning-border: rgba(232,168,56,0.18);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-page: #111113;
      --bg-card: #1c1c1f;
      --bg-diagram: rgba(255,255,255,0.04);
      --text-primary: #e8e6e1;
      --text-secondary: #9e9c97;
      --text-tertiary: #5e5d59;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --warning: #e8a838;
      --warning-bg: rgba(232,168,56,0.08);
      --warning-border: rgba(232,168,56,0.15);
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 740px;
    margin: 0 auto;
    padding: 12px 16px 64px;
  }

  /* --- Header --- */
  .header {
    text-align: center;
    padding: 32px 0 24px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s ease forwards;
  }
  .header-rule {
    height: 1px;
    background: var(--border);
    max-width: 400px;
    margin: 0 auto;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin: 20px 0 6px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    font-weight: 400;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }

  /* --- Card grid --- */
  .grid { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }

  .card {
    background: var(--bg-card);
    border-radius: 14px;
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    transform: translateY(24px);
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .card:hover { border-color: var(--border-hover); }
  .card.open { border-left-color: var(--card-color); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 18px;
  }

  .diagram-box {
    width: 110px;
    height: 110px;
    flex-shrink: 0;
    border-radius: 10px;
    border: 1px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    color: var(--text-primary);
  }
  .diagram-box svg { width: 100%; height: 100%; }

  .card-text { flex: 1; min-width: 0; }
  .card-name-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .card-num { font-size: 12px; font-weight: 700; opacity: 0.6; }
  .card-name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.2;
  }
  .card-def { font-size: 13px; line-height: 1.6; color: var(--text-secondary); }

  .expand-dot {
    width: 28px;
    height: 28px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--border);
    transition: background 0.2s ease;
  }
  .card.open .expand-dot { background: var(--card-color); }
  .expand-icon {
    color: var(--bg-card);
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    transition: transform 0.25s ease;
    display: inline-block;
  }
  .card.open .expand-icon { transform: rotate(45deg); }

  /* --- Facts panel --- */
  .facts-wrap {
    display: none;
    border-top: 1px solid var(--border);
  }
  .card.open .facts-wrap { display: flex; }
  .facts-bar { width: 3px; flex-shrink: 0; background: var(--card-color); }
  .facts-inner { flex: 1; padding: 16px 20px 18px; }
  .facts-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: var(--card-color);
  }
  .fact-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
  .fact-bullet {
    width: 20px;
    height: 20px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .fact-text { font-size: 13px; line-height: 1.6; }

  /* --- Traps section --- */
  .traps-wrap {
    margin-top: 28px;
    padding: 0 4px;
    opacity: 0;
    transform: translateY(16px);
  }
  .traps-btn {
    background: none;
    border: none;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    font-family: 'DM Sans', sans-serif;
  }
  .traps-caret {
    font-size: 9px;
    display: inline-block;
    transition: transform 0.2s ease;
  }
  .traps-btn.open .traps-caret { transform: rotate(90deg); }
  .traps-grid {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  .traps-grid.show { display: grid; }
  .trap-card {
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .trap-q { font-size: 12px; font-weight: 600; color: var(--warning); margin-bottom: 4px; line-height: 1.5; }
  .trap-a { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }

  /* --- Animation --- */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- Responsive --- */
  @media (max-width: 560px) {
    h1 { font-size: 30px; }
    .card-header { gap: 12px; padding: 14px 14px; }
    .diagram-box { width: 80px; height: 80px; }
    .card-name { font-size: 17px; }
    .traps-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="header-rule"></div>
    <p class="eyebrow">Geometry review sheet</p>
    <h1>Circle Terms</h1>
    <p class="subtitle">Six definitions you need cold. Tap a card to reveal the must-know facts.</p>
    <div class="header-rule"></div>
  </header>
  <div class="grid" id="grid"></div>
  <div class="traps-wrap" id="traps-wrap">
    <button class="traps-btn" id="traps-btn" onclick="toggleTraps()">
      <span class="traps-caret">&#9654;</span>
      Common test traps
    </button>
    <div class="traps-grid" id="traps-grid"></div>
  </div>
</div>

<script>
const TERMS = [
  {
    name: "Chord",
    color: "#2E86AB",
    colorLight: "rgba(46,134,171,0.08)",
    colorMid: "rgba(46,134,171,0.18)",
    definition: "A line segment whose two endpoints both lie on the circle.",
    mustKnow: [
      "A diameter is the longest possible chord. It passes through the center.",
      "A chord that is NOT a diameter does NOT pass through the center.",
      "A chord is finite (has endpoints). Do not confuse it with a secant, which extends infinitely.",
      "Intersecting Chords Theorem: if two chords cross inside a circle, the products of their segments are equal (AE \u00D7 EB = CE \u00D7 ED).",
      "Equal chords are equidistant from the center.",
      "A perpendicular drawn from the center to a chord bisects that chord."
    ],
    svg: `<svg viewBox="0 0 220 220"><circle cx="110" cy="110" r="85" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.25"/><line x1="38" y1="140" x2="185" y2="80" stroke="#2E86AB" stroke-width="2.5" stroke-linecap="round"/><circle cx="38" cy="140" r="5" fill="#2E86AB"/><circle cx="185" cy="80" r="5" fill="#2E86AB"/><text x="25" y="158" fill="#2E86AB" font-size="13" font-weight="600" font-family="'DM Serif Display',serif">A</text><text x="188" y="72" fill="#2E86AB" font-size="13" font-weight="600" font-family="'DM Serif Display',serif">B</text><line x1="25" y1="110" x2="195" y2="110" stroke="currentColor" stroke-width="1" stroke-dasharray="5 4" opacity="0.3"/><circle cx="110" cy="110" r="3" fill="currentColor" opacity="0.3"/><text x="110" y="102" text-anchor="middle" fill="currentColor" font-size="10" opacity="0.45" font-family="'DM Sans',sans-serif">diameter</text></svg>`
  },
  {
    name: "Secant",
    color: "#E8475F",
    colorLight: "rgba(232,71,95,0.08)",
    colorMid: "rgba(232,71,95,0.18)",
    definition: "A line that intersects a circle at exactly two points, extending infinitely in both directions.",
    mustKnow: [
      "A secant contains a chord. The chord is the finite part between the two intersection points.",
      "Key distinction: a secant is a LINE (infinite), a chord is a SEGMENT (finite).",
      "Secant-Secant Theorem: from an external point, (whole\u2081) \u00D7 (external\u2081) = (whole\u2082) \u00D7 (external\u2082).",
      "Secant-Tangent Theorem: from an external point, (tangent)\u00B2 = (whole secant) \u00D7 (external segment).",
      "Angle from two secants at an external point = \u00BD |arc\u2081 \u2212 arc\u2082|."
    ],
    svg: `<svg viewBox="0 0 220 220"><circle cx="110" cy="110" r="75" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.25"/><line x1="0" y1="158" x2="220" y2="62" stroke="#E8475F" stroke-width="2" stroke-linecap="round"/><circle cx="42" cy="143" r="5" fill="#E8475F"/><circle cx="178" cy="78" r="5" fill="#E8475F"/><text x="30" y="162" fill="#E8475F" font-size="13" font-weight="600" font-family="'DM Serif Display',serif">P</text><text x="182" y="70" fill="#E8475F" font-size="13" font-weight="600" font-family="'DM Serif Display',serif">Q</text><line x1="42" y1="143" x2="178" y2="78" stroke="#E8475F" stroke-width="4" stroke-linecap="round" opacity="0.15"/><text x="8" y="175" fill="currentColor" font-size="9" opacity="0.4" font-family="'DM Sans',sans-serif">\u2190 extends</text><text x="174" y="55" fill="currentColor" font-size="9" opacity="0.4" font-family="'DM Sans',sans-serif">extends \u2192</text></svg>`
  },
  {
    name: "Tangent",
    color: "#44AF69",
    colorLight: "rgba(68,175,105,0.08)",
    colorMid: "rgba(68,175,105,0.18)",
    definition: "A line that touches the circle at exactly one point, called the point of tangency.",
    mustKnow: [
      "A tangent is ALWAYS perpendicular (\u22A5) to the radius at the point of tangency. This is the most tested property.",
      "A tangent never enters the interior of the circle.",
      "From any external point, exactly two tangent lines can be drawn, and the two tangent segments are equal in length.",
      "Tangent-Chord Angle: the angle between a tangent and a chord = \u00BD the intercepted arc.",
      "Tangent-Tangent Angle (external point): the angle = \u00BD |major arc \u2212 minor arc|."
    ],
    svg: `<svg viewBox="0 0 220 220"><circle cx="110" cy="100" r="72" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.25"/><line x1="10" y1="172" x2="210" y2="172" stroke="#44AF69" stroke-width="2.5" stroke-linecap="round"/><line x1="110" y1="100" x2="110" y2="172" stroke="#44AF69" stroke-width="1.5" stroke-linecap="round"/><polyline points="98,172 98,160 110,160" fill="none" stroke="#44AF69" stroke-width="1.2"/><circle cx="110" cy="100" r="3.5" fill="#44AF69" opacity="0.5"/><circle cx="110" cy="172" r="5" fill="#44AF69"/><text x="118" y="140" fill="#44AF69" font-size="11" font-weight="500" font-family="'DM Sans',sans-serif">r</text><text x="96" y="192" fill="#44AF69" font-size="13" font-weight="600" font-family="'DM Serif Display',serif">T</text><text x="118" y="94" fill="currentColor" font-size="10" opacity="0.4" font-family="'DM Sans',sans-serif">O</text></svg>`
  },
  {
    name: "Inscribed Circle",
    color: "#E8A838",
    colorLight: "rgba(232,168,56,0.08)",
    colorMid: "rgba(232,168,56,0.18)",
    definition: "A circle drawn inside a polygon that is tangent to every side. Also called an incircle.",
    mustKnow: [
      "The center is called the incenter.",
      "For a triangle, the incenter is the intersection of all three angle bisectors.",
      "The incircle is tangent to (touches) each side but does NOT pass through the vertices.",
      "The radius of the incircle is called the inradius (r).",
      "Triangle area using inradius: Area = s \u00D7 r, where s is the semi-perimeter.",
      "Every triangle has exactly one inscribed circle."
    ],
    svg: `<svg viewBox="0 0 220 220"><polygon points="110,22 22,180 198,180" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" opacity="0.35"/><circle cx="110" cy="130" r="48" fill="none" stroke="#E8A838" stroke-width="2.5"/><circle cx="110" cy="130" r="3.5" fill="#E8A838"/><circle cx="66" cy="101" r="3.5" fill="#E8A838" opacity="0.6"/><circle cx="154" cy="101" r="3.5" fill="#E8A838" opacity="0.6"/><circle cx="110" cy="180" r="3.5" fill="#E8A838" opacity="0.6"/><line x1="110" y1="130" x2="66" y2="101" stroke="#E8A838" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4"/><line x1="110" y1="130" x2="154" y2="101" stroke="#E8A838" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4"/><line x1="110" y1="130" x2="110" y2="180" stroke="#E8A838" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4"/><text x="112" y="124" fill="#E8A838" font-size="10" font-weight="500" font-family="'DM Sans',sans-serif">incenter</text></svg>`
  },
  {
    name: "Circumscribed Circle",
    color: "#7B61FF",
    colorLight: "rgba(123,97,255,0.08)",
    colorMid: "rgba(123,97,255,0.18)",
    definition: "A circle drawn around a polygon that passes through every vertex. Also called a circumcircle.",
    mustKnow: [
      "The center is called the circumcenter.",
      "For a triangle, the circumcenter is the intersection of the perpendicular bisectors.",
      "The circumcircle passes through ALL vertices (not the sides).",
      "NOT every polygon has a circumscribed circle. Only cyclic polygons do.",
      "Circumcenter location: inside (acute), on hypotenuse (right), outside (obtuse).",
      "The radius is called the circumradius (R)."
    ],
    svg: `<svg viewBox="0 0 220 220"><circle cx="110" cy="112" r="82" fill="none" stroke="#7B61FF" stroke-width="2.5"/><polygon points="110,30 34,160 186,160" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" opacity="0.35"/><circle cx="110" cy="30" r="5" fill="#7B61FF"/><circle cx="34" cy="160" r="5" fill="#7B61FF"/><circle cx="186" cy="160" r="5" fill="#7B61FF"/><circle cx="110" cy="112" r="3.5" fill="#7B61FF" opacity="0.5"/><line x1="110" y1="112" x2="110" y2="30" stroke="#7B61FF" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4"/><text x="96" y="75" fill="#7B61FF" font-size="11" font-weight="500" font-family="'DM Sans',sans-serif">R</text></svg>`
  },
  {
    name: "Cyclic Quadrilateral",
    color: "#D64F91",
    colorLight: "rgba(214,79,145,0.08)",
    colorMid: "rgba(214,79,145,0.18)",
    definition: "A four-sided polygon where all four vertices lie on a single circle.",
    mustKnow: [
      "KEY THEOREM: opposite angles are supplementary (\u2220A + \u2220C = 180\u00B0, \u2220B + \u2220D = 180\u00B0).",
      "The converse is also true: if opposite angles sum to 180\u00B0, the quadrilateral IS cyclic.",
      "All rectangles (including squares) are cyclic quadrilaterals.",
      "NOT all parallelograms are cyclic. Only rectangles qualify.",
      "Ptolemy's Theorem: AC \u00D7 BD = AB \u00D7 CD + AD \u00D7 BC.",
      "A non-rectangular parallelogram is NEVER cyclic."
    ],
    svg: `<svg viewBox="0 0 220 220"><circle cx="110" cy="108" r="82" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.25"/><polygon points="60,40 178,58 172,175 38,155" fill="none" stroke="#D64F91" stroke-width="2.5" stroke-linejoin="round"/><line x1="60" y1="40" x2="172" y2="175" stroke="#D64F91" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.2"/><line x1="178" y1="58" x2="38" y2="155" stroke="#D64F91" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.2"/><circle cx="60" cy="40" r="5" fill="#D64F91"/><circle cx="178" cy="58" r="5" fill="#D64F91"/><circle cx="172" cy="175" r="5" fill="#D64F91"/><circle cx="38" cy="155" r="5" fill="#D64F91"/><text x="46" y="34" fill="#D64F91" font-size="14" font-weight="600" font-family="'DM Serif Display',serif">A</text><text x="186" y="54" fill="#D64F91" font-size="14" font-weight="600" font-family="'DM Serif Display',serif">B</text><text x="178" y="192" fill="#D64F91" font-size="14" font-weight="600" font-family="'DM Serif Display',serif">C</text><text x="20" y="168" fill="#D64F91" font-size="14" font-weight="600" font-family="'DM Serif Display',serif">D</text><text x="110" y="210" text-anchor="middle" fill="#D64F91" font-size="11" font-weight="500" font-family="'DM Sans',sans-serif">\u2220A + \u2220C = 180\u00B0</text></svg>`
  }
];

const TRAPS = [
  { trap: "Confusing chord vs. secant", fix: "A chord is a segment (finite). A secant is a line (infinite). A secant contains a chord." },
  { trap: "Inscribed vs. circumscribed mix-up", fix: "Inscribed = INSIDE, tangent to sides. Circumscribed = OUTSIDE, passes through vertices." },
  { trap: "\u201CCircumcenter is always inside\u201D", fix: "Inside for acute, on hypotenuse for right, OUTSIDE for obtuse." },
  { trap: "\u201CAll quadrilaterals are cyclic\u201D", fix: "Only those whose opposite angles sum to 180\u00B0." },
  { trap: "\u201CAll parallelograms are cyclic\u201D", fix: "Only rectangles. A generic parallelogram is NOT cyclic." },
  { trap: "Forgetting tangent \u22A5 radius", fix: "Always perpendicular at the point of tangency. Always." }
];

let expandedIndex = null;

function buildCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  TERMS.forEach((term, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (expandedIndex === i ? ' open' : '');
    card.style.setProperty('--card-color', term.color);
    card.style.animation = `fadeUp 0.5s ease ${i * 0.07}s forwards`;
    card.onclick = () => { expandedIndex = expandedIndex === i ? null : i; buildCards(); };

    let factsHTML = '';
    if (expandedIndex === i) {
      const items = term.mustKnow.map((fact, j) =>
        `<div class="fact-row">
          <span class="fact-bullet" style="background:${term.colorMid};color:${term.color}">${j + 1}</span>
          <p class="fact-text">${fact}</p>
        </div>`
      ).join('');
      factsHTML = `
        <div class="facts-wrap">
          <div class="facts-bar" style="background:${term.color}"></div>
          <div class="facts-inner">
            <p class="facts-label" style="color:${term.color}">Must know</p>
            ${items}
          </div>
        </div>`;
    }

    card.innerHTML = `
      <div class="card-header">
        <div class="diagram-box" style="background:${term.colorLight};border-color:${term.colorMid}">
          ${term.svg}
        </div>
        <div class="card-text">
          <div class="card-name-row">
            <span class="card-num" style="color:${term.color}">0${i + 1}</span>
            <div class="card-name">${term.name}</div>
          </div>
          <p class="card-def">${term.definition}</p>
        </div>
        <div class="expand-dot">
          <span class="expand-icon">+</span>
        </div>
      </div>
      ${factsHTML}`;

    grid.appendChild(card);
  });
}

function buildTraps() {
  const trapsGrid = document.getElementById('traps-grid');
  trapsGrid.innerHTML = TRAPS.map(t =>
    `<div class="trap-card">
      <p class="trap-q">${t.trap}</p>
      <p class="trap-a">${t.fix}</p>
    </div>`
  ).join('');
}

function toggleTraps() {
  const btn = document.getElementById('traps-btn');
  const grid = document.getElementById('traps-grid');
  btn.classList.toggle('open');
  grid.classList.toggle('show');
}

document.addEventListener('DOMContentLoaded', () => {
  buildCards();
  buildTraps();
  const trapsWrap = document.getElementById('traps-wrap');
  trapsWrap.style.animation = 'fadeUp 0.5s ease 0.5s forwards';
});
</script>
</body>
</html>
